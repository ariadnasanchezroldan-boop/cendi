<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Una gran aventura  </title>

<style>

body{
margin:0;
font-family:Arial;
text-align:center;
background: linear-gradient(135deg,#ff9a9e,#fad0c4,#fad0c4,#a1c4fd);
background-size:400% 400%;
animation:fondo 10s infinite alternate;
color:white;
}

@keyframes fondo{
0%{background-position:0% 50%;}
100%{background-position:100% 50%;}
}

.container{
margin-top:80px;
}

img{
width:300px;
border-radius:20px;
box-shadow:0 10px 20px rgba(0,0,0,0.3);
transition: transform 0.3s;
}

img:hover{
transform:scale(1.1);
}

button{
margin-top:20px;
padding:12px 30px;
font-size:18px;
border:none;
border-radius:20px;
background:#ff6ec7;
color:white;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#ff3cac;
transform:scale(1.1);
}

#galeria{
display:none;
margin-top:50px;
}

.galeria img{
width:200px;
margin:10px;
}

</style>

</head>

<body>

<div class="container">
<h1>Bienvenido ver mas.. ✨</h1>

<img src=""C:\Users\morit\OneDrive\Imágenes\Capturas de pantalla\Captura de pantalla 2026-03-16 170854.png"" alt="imagen">

<br>

<button onclick="verGaleria()">Ver ahora</button>
</div>


<div id="galeria">
<h2>Más imágenes 📸</h2>

<div class="galeria">

<img src="https://picsum.photos/200?1">
<img src="https://picsum.photos/200?2">
<img src="https://picsum.photos/200?3">
<img src="https://picsum.photos/200?4">

</div>

</div>


<script>

function verGaleria(){
document.querySelector(".container").style.display="none";
document.getElementById("galeria").style.display="block";
window.scrollTo({top:0, behavior:"smooth"});
}

</script>

</body>
</html>
